site_name: Projeto Engenharia de Dados - Bruno M, Gianluca A e Luis Filipe D
site_description: Pipeline com Apache Spark, Delta Lake e Apache Iceberg
site_author: Bruno Monteiro, Gianluca Andrade e Luis FIlipe Damiani
site_url: https://github.com

repo_name: Projeto Engenharia de Dados
repo_url: https://github.com/brunomonteirobonifacio/projeto-engenharia-dados-satc.git
edit_uri: edit/main/docs/ # Confirme se a sua branch do github é main ou master

docs_dir: docs

# Aqui resolvemos o problema das páginas! 
# O trabalho pede: 1 pág Contexto (index), 1 Spark, 1 Iceberg, 1 Delta
nav:
  - Contexto do Trabalho: index.md
  - Apache Spark: spark.md
  - Delta Lake: delta.md
  - Apache Iceberg: iceberg.md

theme:
  name: material
  logo: Imagens/logo.png       
  favicon: Imagens/favicon.png 
  palette:
    primary: black
    accent: white
  language: pt
  features:
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.next-prev
    - search
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
  generator: false

copyright: Copyright &copy; 2026 - Bruno M, Gianluca A e Luis Filipe D - Todos os direitos reservados.

# Ocultei extra_css e extra_javascript se você não os criou (para não dar erro 404). 
# Se você tiver esses arquivos na pasta docs, pode descomentar abaixo:
# extra_css:
#   - stylesheets/extra.css
# extra_javascript:
#   - javascripts/extra.js

plugins:
  - search
  - mkdocstrings:
      default_handler: python

markdown_extensions: 
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg